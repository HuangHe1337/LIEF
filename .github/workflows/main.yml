name: Build LIEF Android AArch64 DEB

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build cmake dpkg-dev ccache

    # 开启编译缓存，加速重复构建
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-android-lief

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK_LATEST_HOME }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-28 \
          -DCMAKE_BUILD_TYPE=Release \
          -DLIEF_INSTALL=ON \
          -DLIEF_USE_CCACHE=ON \
          -DCPACK_GENERATOR=DEB \
          -DCMAKE_INSTALL_PREFIX=/data/data/com.termux/files/usr

    - name: Build
      run: cmake --build build --config Release

    - name: Package DEB
      run: |
        cd build
        cpack -G DEB

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lief-android-aarch64-deb
        path: build/*.deb

    - name: Upload to GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/*.deb
        generate_release_notes: true
